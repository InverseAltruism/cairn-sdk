name: ci

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# cairn-sdk had NO CI (audit CAIRN-SDK-CI-NONE-1) — every drift (SDK_VERSION, the stale csd-* pin, the
# tautological version test) shipped unnoticed. This is a push/PR test + dep-freshness gate (there is no
# publish job): it builds + typechecks + tests on every push/PR and checks that every exact-pinned csd-*
# (in both dependencies AND devDependencies) is the ecosystem lockstep version. The csd-* are PUBLIC npm
# packages, so no sibling checkout/token is needed (unlike cairn).

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: typecheck
        run: pnpm exec tsc --noEmit
      - name: build (all 9 subpaths emit ESM+CJS+dts)
        run: pnpm build
      - name: test (sdk/connect/errors/controller/react/hardening)
        run: pnpm test
      - name: dep-freshness — every csd-* pin must equal the ecosystem lockstep version
        run: |
          node -e '
            const p = require("./package.json");
            const all = { ...(p.dependencies || {}), ...(p.devDependencies || {}) };
            const pins = Object.entries(all).filter(([k]) => k.startsWith("@inversealtruism/csd-"));
            const vers = [...new Set(pins.map(([, v]) => v))];
            if (vers.length !== 1) { console.error("::error::csd-* pins are not uniform:", JSON.stringify(pins)); process.exit(1); }
            if (/^[\^~]/.test(vers[0])) { console.error("::error::csd-* must be EXACT-pinned (no caret/tilde):", vers[0]); process.exit(1); }
            console.log("csd-* exact-pinned uniformly at", vers[0]);
          '
